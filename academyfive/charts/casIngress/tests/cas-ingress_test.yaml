suite: casIngress - cas Ingress
templates:
  - cas-ingress.yaml
tests:
  - it: should render an Ingress with correct name and ingressClassName
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: metadata.name
          value: ingress-cas
      - equal:
          path: spec.ingressClassName
          value: nginx

  - it: should have TLS with correct hosts and secretName
    asserts:
      - exists:
          path: spec.tls
      - equal:
          path: spec.tls[0].secretName
          value: academyfive.net-tls
      - equal:
          path: spec.tls[0].hosts
          value:
            - application.university.com
            - community.university.com
            - pwa.university.com

  - it: should render rules for all casHosts
    asserts:
      - exists:
          path: spec.rules
      - equal:
          path: spec.rules[0].host
          value: application.university.com
      - equal:
          path: spec.rules[1].host
          value: community.university.com
      - equal:
          path: spec.rules[2].host
          value: pwa.university.com

  - it: should route all hosts to service cas on port 80 with path /
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: Prefix
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: cas
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 80

  - it: should have ingress-nginx annotations with default values
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/client-body-buffer-size"]
          value: 100M
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/proxy-body-size"]
          value: 500M
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/proxy-read-timeout"]
          value: "600"
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/proxy-send-timeout"]
          value: "600"
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/client-body-timeout"]
          value: "3000"
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/use-gzip"]
          value: "true"
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/gzip-level"]
          value: "6"
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/use-http2"]
          value: "true"

  - it: should have f5-nginx-ingress (nginx.org) annotations with default values
    asserts:
      - equal:
          path: metadata.annotations["nginx.org/client-body-buffer-size"]
          value: 100M
      - equal:
          path: metadata.annotations["nginx.org/client-max-body-size"]
          value: 500M
      - equal:
          path: metadata.annotations["nginx.org/proxy-read-timeout"]
          value: 600s
      - equal:
          path: metadata.annotations["nginx.org/proxy-send-timeout"]
          value: 600s

  - it: should have server-snippets annotation for f5-nginx-ingress
    asserts:
      - exists:
          path: metadata.annotations["nginx.org/server-snippets"]

  - it: should omit TLS when tlsSecretName is empty
    set:
      ingress.tlsSecretName: ""
    asserts:
      - notExists:
          path: spec.tls

  - it: should use custom ingressClassName when set
    set:
      ingress.ingressClassName: f5-nginx
    asserts:
      - equal:
          path: spec.ingressClassName
          value: f5-nginx

  - it: should apply custom labels when provided
    set:
      ingress.labels:
        app: cas
        environment: production
    asserts:
      - equal:
          path: metadata.labels.app
          value: cas
      - equal:
          path: metadata.labels.environment
          value: production

  - it: should apply custom annotations when provided
    set:
      ingress.annotations:
        custom.io/annotation: "test-value"
    asserts:
      - equal:
          path: metadata.annotations["custom.io/annotation"]
          value: test-value

  - it: should render only the specified casHosts when overridden
    set:
      casHosts:
        - name: my-cas.example.com
    asserts:
      - equal:
          path: spec.rules[0].host
          value: my-cas.example.com
      - equal:
          path: spec.tls[0].hosts
          value:
            - my-cas.example.com
