{{- $style := .Values.global.ingressAnnotationStyle | default "nginx-inc" -}}
{{- $emitF5 := or (eq $style "nginx-inc") (eq $style "both") -}}
{{- $emitLegacy := or (eq $style "ingress-nginx") (eq $style "both") -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-cas
  {{- with .Values.ingress.labels }}
  labels:
  {{- toYaml . | nindent 4 }}
  {{- end }}
  annotations:
  {{- with .Values.ingress.annotations }}
    {{- range $key, $value := . }}
    {{ $key }}: {{ tpl $value $ | quote }}
    {{- end }}
  {{- end }}
  {{- if $emitF5 }}
    # F5/NGINX Inc. Ingress Controller annotations (nginx.org/*)
    nginx.org/client-max-body-size: {{ quote .Values.ingress.proxyBodySize }}
    nginx.org/proxy-connect-timeout: {{ quote .Values.ingress.proxyConnectTimeout }}
    nginx.org/proxy-read-timeout: {{ quote .Values.ingress.proxyReadTimeout }}
    nginx.org/proxy-send-timeout: {{ quote .Values.ingress.proxySendTimeout }}
    nginx.org/server-snippets: |
      client_body_buffer_size {{ .Values.ingress.clientBodyBufferSize }};
      client_body_timeout 3000s;
      client_header_buffer_size 2k;
      client_header_timeout 3000s;
      large_client_header_buffers 2 1k;
      keepalive_timeout 5s;
      keepalive_requests 10000;
    nginx.org/location-snippets: |
      add_header Ingress-Resource "ingress-cas";
  {{- end }}
  {{- if $emitLegacy }}
    # Legacy kubernetes/ingress-nginx annotations (EOL March 2026, kept for cutover)
    nginx.ingress.kubernetes.io/client-body-buffer-size: {{ .Values.ingress.clientBodyBufferSize }}
    nginx.ingress.kubernetes.io/proxy-body-size: {{ .Values.ingress.proxyBodySize }}
    nginx.ingress.kubernetes.io/client-body-timeout: "3000"
    nginx.ingress.kubernetes.io/large-client-header-buffers: "2 1k"
    nginx.ingress.kubernetes.io/client-header-buffer-size: "2k"
    nginx.ingress.kubernetes.io/client-header-timeout: "3000"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: {{ quote .Values.ingress.proxyConnectTimeout }}
    nginx.ingress.kubernetes.io/proxy-read-timeout: {{ quote .Values.ingress.proxyReadTimeout }}
    nginx.ingress.kubernetes.io/proxy-send-timeout: {{ quote .Values.ingress.proxySendTimeout }}
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Ingress-Resource "ingress-cas";
    nginx.ingress.kubernetes.io/keep-alive: "5"
    nginx.ingress.kubernetes.io/keep-alive-requests: "10000"
    nginx.ingress.kubernetes.io/use-gzip: "true"
    nginx.ingress.kubernetes.io/gzip-level: "6"
    nginx.ingress.kubernetes.io/use-http2: "true"
  {{- end }}
spec:
  {{- if .Values.ingress.tlsSecretName }}
  tls:
    - hosts:
        - {{ quote .Values.global.hosts }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  {{- end }}
  rules:
  {{- range $casHosts := .Values.casHosts }}
    - host: {{ $casHosts.name }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cas
                port:
                  number: 80
  {{- end }}
  ingressClassName: {{ .Values.ingress.ingressClassName }}
