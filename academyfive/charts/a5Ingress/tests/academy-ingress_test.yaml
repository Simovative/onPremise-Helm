suite: a5Ingress - academy Ingress
templates:
  - academy-ingress.yaml
tests:
  - it: should render an Ingress with correct name and ingressClassName
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: metadata.name
          value: ingress-academy
      - equal:
          path: spec.ingressClassName
          value: nginx

  - it: should have TLS with correct hosts and secretName
    set:
      global.domain: academy.university.com
    asserts:
      - exists:
          path: spec.tls
      - equal:
          path: spec.tls[0].secretName
          value: academyfive.net-tls
      - equal:
          path: spec.tls[0].hosts
          value:
            - academy.university.com

  - it: should include olddomain in TLS hosts when set
    set:
      global.domain: academy.university.com
      global.olddomain: old-academy.university.com
    asserts:
      - equal:
          path: spec.tls[0].hosts
          value:
            - academy.university.com
            - old-academy.university.com

  - it: should render rule for global.domain
    set:
      global.domain: academy.university.com
    asserts:
      - exists:
          path: spec.rules
      - equal:
          path: spec.rules[0].host
          value: academy.university.com

  - it: should route to service academy on port 80 with path /
    set:
      global.domain: academy.university.com
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: Prefix
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: academy
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 80

  - it: should render olddomain rule when global.olddomain is set
    set:
      global.domain: academy.university.com
      global.olddomain: old-academy.university.com
    asserts:
      - equal:
          path: spec.rules[1].host
          value: old-academy.university.com
      - equal:
          path: spec.rules[1].http.paths[0].backend.service.name
          value: academy

  - it: should not render olddomain rule when global.olddomain is not set
    set:
      global.domain: academy.university.com
    asserts:
      - equal:
          path: spec.rules
          value:
            - host: academy.university.com
              http:
                paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: academy
                        port:
                          number: 80

  - it: should have ingress-nginx annotations with default values
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/client-body-buffer-size"]
          value: 100M
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/proxy-body-size"]
          value: 100M
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/proxy-connect-timeout"]
          value: "75"
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/proxy-read-timeout"]
          value: "36000"
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/proxy-send-timeout"]
          value: "36000"
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/client-body-timeout"]
          value: "36000"
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/client-header-timeout"]
          value: "36000"
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/use-gzip"]
          value: "true"
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/gzip-level"]
          value: "6"
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/use-http2"]
          value: "true"

  - it: should have f5-ingress-nginx (nginx.org) annotations with default values
    asserts:
      - equal:
          path: metadata.annotations["nginx.org/client-body-buffer-size"]
          value: 100M
      - equal:
          path: metadata.annotations["nginx.org/client-max-body-size"]
          value: 100M
      - equal:
          path: metadata.annotations["nginx.org/proxy-connect-timeout"]
          value: "75"
      - equal:
          path: metadata.annotations["nginx.org/proxy-read-timeout"]
          value: "36000s"
      - equal:
          path: metadata.annotations["nginx.org/proxy-send-timeout"]
          value: "36000s"

  - it: should have server-snippets annotation for f5-ingress-nginx
    asserts:
      - exists:
          path: metadata.annotations["nginx.org/server-snippets"]

  - it: should omit TLS when tlsSecretName is empty
    set:
      ingress.tlsSecretName: ""
    asserts:
      - notExists:
          path: spec.tls

  - it: should use custom ingressClassName when set
    set:
      ingress.ingressClassName: f5-nginx
    asserts:
      - equal:
          path: spec.ingressClassName
          value: f5-nginx

  - it: should apply custom labels when provided
    set:
      ingress.labels:
        app: academy
        environment: production
    asserts:
      - equal:
          path: metadata.labels.app
          value: academy
      - equal:
          path: metadata.labels.environment
          value: production

  - it: should apply custom annotations when provided
    set:
      ingress.annotations:
        custom.io/annotation: "test-value"
    asserts:
      - equal:
          path: metadata.annotations["custom.io/annotation"]
          value: test-value
