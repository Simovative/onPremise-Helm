# Default values for nginxControllerConfig.
#
# Opt-in subchart. When enabled, the academyfive chart manages the ConfigMap
# read by the F5/NGINX Inc. Kubernetes Ingress Controller
# (https://github.com/nginx/kubernetes-ingress).
#
# Two deployment modes:
#   1. Managed (recommended for dedicated controllers):
#        nginxControllerConfig.enabled: true
#      The chart owns the ConfigMap. Customers extend via data.* overrides.
#   2. Manual (for shared/multi-tenant controllers):
#        nginxControllerConfig.enabled: false  (default)
#      Customer applies nginx-configmap/nginx-configmap.yaml from the repo
#      separately. See nginx-configmap/README.md.

enabled: false

configMap:
  # Must match the ConfigMap name the running NGINX Ingress Controller is
  # configured to read (see the controller's -nginx-configmaps CLI flag).
  # The default below matches the F5 NGINX Inc. Helm chart's default.
  name: nginx-ingress
  namespace: nginx-ingress

  # ConfigMap data. Keys are F5 NGINX Inc. ConfigMap keys
  # (https://docs.nginx.com/nginx-ingress-controller/configuration/global-configuration/configmap-resource/).
  # Override individual keys or replace the http-snippets block entirely.
  data:
    http2: "true"
    # client-side keepalive defaults (per-Ingress overrides via nginx.org/server-snippets)
    keepalive-timeout: "5s"
    keepalive-requests: "10000"
    # log formats, gzip, and the global proxy_cache_path used by the asset-cache Ingress
    http-snippets: |
      log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" '
                       '"$http_user_agent" "$http_x_forwarded_for"';

      log_format upstream_time '$remote_addr - $remote_user [$time_local] ' '"$request" $status $body_bytes_sent ' '"$http_referer" "$http_user_agent"' ' rt="$request_time"|"$upstream_connect_time"|"$upstream_header_time"|"$upstream_response_time"';

      access_log  /var/log/nginx/access.log  main;

      sendfile        on;

      gzip on;
      gzip_comp_level 6;

      proxy_cache_path /tmp/nginx-cache  levels=1:2    keys_zone=nginxproxycache:10m    inactive=24h  max_size=1g;
      proxy_store_access user:rw group:rw all:r;
      proxy_hide_header Upgrade;
