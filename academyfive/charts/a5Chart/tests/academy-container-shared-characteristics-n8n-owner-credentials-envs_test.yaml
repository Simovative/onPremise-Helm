# CHART_PATH/tests/academy-pod_test.yaml
# we test that these containers share these characteristics
suite: a5Chart - Academy Container N8N Owner Credentials Envs
templates:
  - academy-pod.yaml
  - cron-pod.yaml
  - migration-job.yaml
  - academy-configmap.yaml # needed for checksum check
  - cron-configmap.yaml # needed for checksum check
tests:
  - it: cron-pod and academy-pod should be deployments
    templates:
      - academy-pod.yaml
      - cron-pod.yaml
    asserts:
      - isKind:
          of: Deployment

# serviceAccountName
  - it: should set default as serviceAccount name
    templates:
      - academy-pod.yaml
      - cron-pod.yaml
      - migration-job.yaml
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: "default"
  - it: should set serviceAccount name
    templates:
      - academy-pod.yaml
      - cron-pod.yaml
      - migration-job.yaml
    set:
      deployment.serviceAccountName: "my-service-account"
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: "my-service-account"

# secret tests
  - it: should set default secrets N8N OWNER
    templates:
      - academy-pod.yaml
      - cron-pod.yaml
      - migration-job.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: N8N_OWNER_USERNAME
            valueFrom:
              secretKeyRef:
                key: email
                name: "n8n-owner-credentials"
                optional: true
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: N8N_OWNER_PASSWORD
            valueFrom:
              secretKeyRef:
                key: password
                name: "n8n-owner-credentials"
                optional: true
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: N8N_OWNER_API_KEY
            valueFrom:
              secretKeyRef:
                key: apiToken
                name: "n8n-owner-credentials"
                optional: true
  - it: should set N8N-OWNER-Secrets from values-file
    templates:
      - academy-pod.yaml
      - cron-pod.yaml
      - migration-job.yaml
    set:
      infrastructureData.n8n_owner_credentials_secret_name: "n8n-custom-secret"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: N8N_OWNER_USERNAME
            valueFrom:
              secretKeyRef:
                key: email
                name: "n8n-custom-secret"
                optional: true
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: N8N_OWNER_PASSWORD
            valueFrom:
              secretKeyRef:
                key: password
                name: "n8n-custom-secret"
                optional: true
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: N8N_OWNER_API_KEY
            valueFrom:
              secretKeyRef:
                key: apiToken
                name: "n8n-custom-secret"
                optional: true

