# CHART_PATH/tests/academy-pod_test.yaml
suite: a5Chart - Academy Pod
templates:
  - academy-pod.yaml
  - academy-configmap.yaml # needed for checksum check
tests:
  - it: should be a Deployment and match properly
    template: academy-pod.yaml
    asserts:
      - isKind:
          of: Deployment
      - matchRegex:
          path: metadata.name
          pattern: academy-deployment

  - it: should set replicas from values
    template: academy-pod.yaml
    set:
      deployment.academyfiveReplicas: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3
# serviceAccountName
  - it: should set default as serviceAccount name
    template: academy-pod.yaml
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: "default"
  - it: should set serviceAccount name
    template: academy-pod.yaml
    set:
      deployment.serviceAccountName: "my-service-account"
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: "my-service-account"
  - it: should mount oas-files-volume when OAS_FILE_STORAGE_TYPE is "file"
    template: academy-pod.yaml
    set:
      envData:
        OAS_FILE_STORAGE_TYPE: "file"
        OAS_FILE_STORAGE_LOCATION: "/mnt/oas-files"
      infrastructureData:
        oas_file_storage_volume_claim_name: "oas-file-storage-volume"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: oas-files-volume
            mountPath: "/mnt/oas-files"

  - it: should mount oas-files-volume at correct path
    template: academy-pod.yaml
    set:
      envData:
        OAS_FILE_STORAGE_TYPE: "file"
        OAS_FILE_STORAGE_LOCATION: "/custom/oas/path"
      infrastructureData:
        oas_file_storage_volume_claim_name: "oas-pvc"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: oas-files-volume
            mountPath: "/custom/oas/path"

  - it: should use correct PVC claim name for oas-files-volume
    template: academy-pod.yaml
    set:
      envData:
        OAS_FILE_STORAGE_TYPE: "file"
        OAS_FILE_STORAGE_LOCATION: "/mnt/oas-files"
      infrastructureData:
        oas_file_storage_volume_claim_name: "my-custom-oas-pvc"
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: oas-files-volume
            persistentVolumeClaim:
              claimName: "my-custom-oas-pvc"

  - it: should NOT mount oas-files-volume when storage type is s3
    template: academy-pod.yaml
    set:
      envData:
        OAS_FILE_STORAGE_TYPE: "s3"
        OAS_FILE_STORAGE_LOCATION: "/mnt/oas-files"
      infrastructureData:
        oas_file_storage_volume_claim_name: "oas-file-storage-volume"
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: oas-files-volume
