{{- if .Values.enabled }}
{{- $password := (randAlpha 128) | b64enc }}
{{- $secret := (lookup "v1" "Secret" .Release.Namespace .Values.secret.n8n_user_management_jwt_secret_name) }}
{{- if $secret }}
  {{- if (index $secret.data "password") }}
    {{- $password = index $secret.data "password" }}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.n8n_user_management_jwt_secret_name }}
type: Opaque
data:
  password: {{ $password }}
{{- end }}
